# ====================================================================================================
# MATERFORGE MATERIAL CONFIGURATION FILE
# ====================================================================================================
# Material properties for Couette flow simulation with temperature-dependent viscosity
# Higher viscosity values for numerical stability
# ====================================================================================================

name: "CouetteFlowSteel"

properties:
  # ====================================================================================================
  # CONSTANT PROPERTIES
  # ====================================================================================================
  # Temperature properties
  solidus_temperature: 1673.0
  liquidus_temperature: 1723.0
  initial_boiling_temperature: 3100.0
  final_boiling_temperature: 3200.0
  latent_heat_of_fusion: 270000.0
  latent_heat_of_vaporization: 6300000.0

  # ====================================================================================================
  # DENSITY - Temperature-dependent (thermal expansion)
  # ====================================================================================================
  
  density:
    dependency: (300, 600, 31)
    equation: 7850.0 / (1.0 + 3.0 * thermal_expansion_coefficient * (T - 293.15))
    bounds: [constant, constant]
    regression:
      simplify: post
      degree: 2
      segments: 2

  # ====================================================================================================
  # THERMAL EXPANSION COEFFICIENT - Temperature-dependent
  # ====================================================================================================
  
  thermal_expansion_coefficient:
    dependency: [300, 400, 500, 600]
    value: [11.7e-6, 12.8e-6, 13.5e-6, 14.0e-6]
    bounds: [constant, constant]
    regression:
      simplify: post
      degree: 1
      segments: 1

  # ====================================================================================================
  # HEAT CAPACITY - Temperature-dependent
  # ====================================================================================================
  
  heat_capacity:
    dependency: [300, 400, 500, 600]
    value: [460, 500, 520, 540]
    bounds: [constant, constant]
    regression:
      simplify: post
      degree: 2
      segments: 2

  # ====================================================================================================
  # THERMAL CONDUCTIVITY - Temperature-dependent 
  # ====================================================================================================
  
  heat_conductivity:
    dependency: [300, 400, 500, 600]
    value: [16.3, 18.5, 20.8, 23.1]
    bounds: [constant, constant]
    regression:
      simplify: post
      degree: 1
      segments: 2

  # ====================================================================================================
  # DYNAMIC VISCOSITY - Higher values for numerical stability
  # ====================================================================================================
  
  dynamic_viscosity:
    # 31 sample points over the full 300-3000 K property domain (the previous
    # "300-600K" comment was stale). The viscosity is smooth, so two degree-2
    # piecewise segments reproduce the analytical Couette velocity profile to
    # L_inf ~ 1e-6 at negligible regression cost.
    dependency: (300, 3000, 31)
    equation: 0.16667 * exp(-0.0005 * (T - 300.0))  # LBM-scaled viscosity
    bounds: [linear, linear]
    regression:
      simplify: post
      degree: 2
      segments: 2

  # ====================================================================================================
  # COMPUTED PROPERTIES
  # ====================================================================================================
  
  thermal_diffusivity:
    dependency: (300, 600, 31)
    equation: heat_conductivity / (density * heat_capacity)
    bounds: [constant, constant]
    regression:
      simplify: post
      degree: 2
      segments: 2

  kinematic_viscosity:
    dependency: (300, 600, 31)
    equation: dynamic_viscosity / density
    bounds: [constant, constant]
    regression:
      simplify: post
      degree: 2
      segments: 2

  specific_enthalpy:
    dependency: (300, 600, 31)
    equation: Integral(heat_capacity, T)
    bounds: [constant, constant]
    regression:
      simplify: post
      degree: 2
      segments: 2

  energy_density:
    dependency: (300, 600, 31)
    equation: density * specific_enthalpy
    bounds: [linear, linear]
    regression:
      simplify: post
      degree: 2
      segments: 2

# ====================================================================================================
# DYNAMIC_VISCOSITY NOTES
#
# The value is a dimensionless LBM (lattice) kinematic viscosity, NOT a physical Pa·s
# viscosity — it is fed directly to relaxation_rate_from_lattice_viscosity() in
# CouetteFlowSweeps.py. It is kept in the 0.04–0.17 range so the relaxation rate stays
# well away from the omega->2 instability limit across the whole temperature span.
#
# Equation: nu(T) = 0.16667 * exp(-0.0005 * (T - 300))   over 300-3000 K
# Sampled viscosity (smooth, ~74% drop across the span):
# - At  300 K: nu = 0.1667
# - At  600 K: nu = 0.1434
# - At 1500 K: nu = 0.0915
# - At 3000 K: nu = 0.0432
#
# ====================================================================================================
